<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Emerald Sheets Online</title><link rel="stylesheet" href="../../assets/emerald-suite.css"><link rel="icon" href="../../assets/emerald-mail-logo.png"></head><body><script src="../../assets/emerald-suite.js"></script><script>document.body.innerHTML=appShell("sheets");if(requireLogin())initSheets();let fileId=new URL(location.href).searchParams.get("id")||"",cells={},rows=30,cols=12;function initSheets(){appMain.innerHTML=`<div class="page-title"><div><h1>Emerald Sheets Online</h1><p>Spreadsheet editor with formulas and CSV export.</p></div><button class="primary" onclick="saveSheet()">Save to Drive</button></div><div class="toolbar"><input id="sheetName" value="Untitled Sheet" style="border:1px solid var(--line);border-radius:12px;padding:10px"><button class="secondary" onclick="exportCsv()">Export CSV</button><button class="secondary" onclick="addRow()">Add Row</button><button class="secondary" onclick="addCol()">Add Column</button></div><div class="sheet"><table id="grid"></table></div>`;renderGrid();if(fileId)loadSheet()}function cellName(r,c){let s="";c++;while(c){let m=(c-1)%26;s=String.fromCharCode(65+m)+s;c=Math.floor((c-1)/26)}return s+(r+1)}function renderGrid(){let h="<tr><th></th>";for(let c=0;c<cols;c++)h+=`<th>${cellName(0,c).replace("1","")}</th>`;h+="</tr>";for(let r=0;r<rows;r++){h+=`<tr><th>${r+1}</th>`;for(let c=0;c<cols;c++){let k=cellName(r,c);h+=`<td><input data-cell="${k}" value="${escapeHtml(cells[k]||"")}" oninput="cells[this.dataset.cell]=this.value" onblur="recalc()"></td>`}h+="</tr>"}grid.innerHTML=h;recalc()}function valueOf(k){let v=cells[k]||"";if(String(v).startsWith("="))return evalFormula(v.slice(1));let n=Number(v);return Number.isFinite(n)&&v!==""?n:v}function evalFormula(f){try{if(f.startsWith("SUM("))return range(f.slice(4,-1)).reduce((a,b)=>a+Number(valueOf(b)||0),0);if(f.startsWith("AVERAGE(")){let arr=range(f.slice(8,-1)).map(x=>Number(valueOf(x)||0));return arr.reduce((a,b)=>a+b,0)/(arr.length||1)}return Function("return "+f.replace(/[A-Z]+[0-9]+/g,m=>Number(valueOf(m)||0)))()}catch{return"#ERR"}}function range(s){let[a,b]=s.split(":");if(!b)return[a];let ca=a.match(/[A-Z]+/)[0].charCodeAt(0)-65,ra=Number(a.match(/[0-9]+/)[0])-1,cb=b.match(/[A-Z]+/)[0].charCodeAt(0)-65,rb=Number(b.match(/[0-9]+/)[0])-1,out=[];for(let r=ra;r<=rb;r++)for(let c=ca;c<=cb;c++)out.push(cellName(r,c));return out}function recalc(){document.querySelectorAll("[data-cell]").forEach(i=>{if(String(i.value).startsWith("="))i.title=String(valueOf(i.dataset.cell))})}async function loadSheet(){const d=await(await api(`/api/drive/open?id=${fileId}&json=1`)).json();if(!d.ok){toast(d.error);return}sheetName.value=d.file.name;try{const data=JSON.parse(atob(d.content_base64||"{}"));cells=data.cells||{};rows=data.rows||30;cols=data.cols||12;renderGrid()}catch{}}async function saveSheet(){let content=JSON.stringify({cells,rows,cols}),name=sheetName.value||"Untitled Sheet";if(fileId){let d=await(await api("/api/drive/update",{method:"POST",body:JSON.stringify({id:fileId,name,mime_type:"application/vnd.emerald.sheet",content})})).json();if(!d.ok){toast(d.error);return}}else{let d=await(await api("/api/drive/create",{method:"POST",body:JSON.stringify({name,kind:"file",mime_type:"application/vnd.emerald.sheet",content})})).json();if(!d.ok){toast(d.error);return}fileId=d.file.id;history.replaceState(null,"",`?id=${fileId}`)}toast("Saved")}function exportCsv(){let csv=[];for(let r=0;r<rows;r++){let line=[];for(let c=0;c<cols;c++)line.push(JSON.stringify(String(valueOf(cellName(r,c))||"")));csv.push(line.join(","))}let a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv.join("\n")],{type:"text/csv"}));a.download=(sheetName.value||"sheet")+".csv";a.click()}function addRow(){rows++;renderGrid()}function addCol(){cols++;renderGrid()}</script></body></html>
