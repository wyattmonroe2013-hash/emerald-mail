<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Emerald Docs Online</title><link rel="stylesheet" href="../../assets/emerald-suite.css"><link rel="icon" href="../../assets/emerald-mail-logo.png"></head><body><script src="../../assets/emerald-suite.js"></script><script>document.body.innerHTML=appShell("docs");if(requireLogin())initDocs();let fileId=new URL(location.href).searchParams.get("id")||"",currentName="Untitled Document";function initDocs(){appMain.innerHTML=`<div class="page-title"><div><h1>Emerald Docs Online</h1><p>Online document editor connected to Emerald Drive.</p></div><button class="primary" onclick="saveDoc()">Save to Drive</button></div><div class="toolbar"><button class="secondary" onclick="exec('bold')"><b>B</b></button><button class="secondary" onclick="exec('italic')"><i>I</i></button><button class="secondary" onclick="exec('underline')"><u>U</u></button><button class="secondary" onclick="exec('insertUnorderedList')">Bullets</button><button class="secondary" onclick="exec('insertOrderedList')">Numbers</button><button class="secondary" onclick="exec('formatBlock','h1')">Title</button><button class="secondary" onclick="downloadHtml()">Export HTML</button><input id="docName" placeholder="Document name" value="Untitled Document" style="max-width:260px;border:1px solid var(--line);border-radius:12px;padding:10px"></div><div id="editor" class="editor" contenteditable="true"><h1>Untitled Document</h1><p>Start writing...</p></div>`;if(fileId)loadDoc()}function exec(cmd,val=null){document.execCommand(cmd,false,val)}async function loadDoc(){const d=await(await api(`/api/drive/open?id=${fileId}&json=1`)).json();if(!d.ok){toast(d.error);return}currentName=d.file.name;docName.value=currentName;editor.innerHTML=atob(d.content_base64||"")||""}async function saveDoc(){const name=docName.value||currentName||"Untitled Document";if(fileId){const d=await(await api("/api/drive/update",{method:"POST",body:JSON.stringify({id:fileId,name,mime_type:"application/vnd.emerald.doc",content:editor.innerHTML})})).json();if(!d.ok){toast(d.error);return}toast("Saved")}else{const d=await(await api("/api/drive/create",{method:"POST",body:JSON.stringify({name,kind:"file",mime_type:"application/vnd.emerald.doc",content:editor.innerHTML})})).json();if(!d.ok){toast(d.error);return}fileId=d.file.id;history.replaceState(null,"",`?id=${fileId}`);toast("Created in Drive")}}function downloadHtml(){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([editor.innerHTML],{type:"text/html"}));a.download=(docName.value||"document")+".html";a.click()}</script></body></html>
