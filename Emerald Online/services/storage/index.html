<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Emerald Storage Online</title><link rel="stylesheet" href="../../assets/emerald-suite.css"><link rel="icon" href="../../assets/emerald-mail-logo.png"></head><body><script src="../../assets/emerald-suite.js"></script><script>document.body.innerHTML=appShell("storage");if(requireLogin())initStorage();async function initStorage(){appMain.innerHTML=`<div class="page-title"><div><h1>Emerald Storage Online</h1><p>Storage usage and file overview.</p></div><button class="primary" onclick="location.href='../drive/index.html'">Manage Drive</button></div><div class="grid grid-3" id="stats"></div><br><div class="card"><table class="table"><thead><tr><th>Largest files</th><th>Size</th><th>Updated</th></tr></thead><tbody id="rows"></tbody></table></div>`;loadStats()}async function loadStats(){const d=await(await api("/api/drive/list?view=recent")).json();if(!d.ok){toast(d.error);return}const files=d.files||[],used=(d.storage||{}).used_bytes||0;stats.innerHTML=`<div class="card card-pad"><h2>${fmtBytes(used)}</h2><p class="muted">Used storage</p></div><div class="card card-pad"><h2>${files.length}</h2><p class="muted">Files and folders</p></div><div class="card card-pad"><h2>${files.filter(f=>f.trashed).length}</h2><p class="muted">Trash items</p></div>`;rows.innerHTML=files.filter(f=>f.kind!=="folder").sort((a,b)=>b.size-a.size).slice(0,25).map(f=>`<tr><td>${escapeHtml(f.name)}</td><td>${fmtBytes(f.size)}</td><td>${fmtDate(f.updated_at)}</td></tr>`).join("")||`<tr><td colspan="3">No files.</td></tr>`}</script></body></html>
