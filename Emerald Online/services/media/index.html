<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Emerald Media Player Online</title><link rel="stylesheet" href="../../assets/emerald-suite.css"><link rel="icon" href="../../assets/emerald-mail-logo.png"></head><body><script src="../../assets/emerald-suite.js"></script><script>document.body.innerHTML=appShell("media");if(requireLogin())initMedia();let fileId=new URL(location.href).searchParams.get("id")||"";function initMedia(){appMain.innerHTML=`<div class="page-title"><div><h1>Emerald Media Player Online</h1><p>Play audio/video and preview images from Emerald Drive.</p></div><button class="secondary" onclick="location.href='../drive/index.html'">Open Drive</button></div><div class="card card-pad" id="player">Select a media file from Drive.</div><div class="card" style="margin-top:16px"><table class="table"><tbody id="mediaRows"></tbody></table></div>`;if(fileId)play(fileId);loadMediaList()}async function loadMediaList(){const d=await(await api("/api/drive/list?view=recent")).json();const media=(d.files||[]).filter(f=>/image|video|audio/.test(f.mime_type));mediaRows.innerHTML=media.map(f=>`<tr><td><b>${escapeHtml(f.name)}</b><div class="muted">${escapeHtml(f.mime_type)} · ${fmtBytes(f.size)}</div></td><td><button class="secondary" onclick="play('${f.id}')">Play</button></td></tr>`).join("")||`<tr><td>No media files found.</td></tr>`}function play(id){const url=EMERALD_MAIL_WORKER_URL+`/api/drive/open?id=${id}`;api(`/api/drive/open?id=${id}&json=1`).then(r=>r.json()).then(d=>{if(!d.ok){toast(d.error);return}const f=d.file;let html="";if(f.mime_type.startsWith("image/"))html=`<img src="${url}" style="max-width:100%;border-radius:16px">`;else if(f.mime_type.startsWith("video/"))html=`<video src="${url}" controls style="width:100%;border-radius:16px"></video>`;else if(f.mime_type.startsWith("audio/"))html=`<audio src="${url}" controls style="width:100%"></audio>`;else html="Unsupported media.";player.innerHTML=`<h2>${escapeHtml(f.name)}</h2>${html}<p class="muted">${escapeHtml(f.mime_type)} · ${fmtBytes(f.size)}</p>`})}</script></body></html>
