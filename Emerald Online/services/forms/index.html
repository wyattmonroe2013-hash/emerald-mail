<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Emerald Forms Online</title><link rel="stylesheet" href="../../assets/emerald-suite.css"><link rel="icon" href="../../assets/emerald-mail-logo.png"></head><body><script src="../../assets/emerald-suite.js"></script><script>document.body.innerHTML=appShell("forms");if(requireLogin())initForms();let fileId=new URL(location.href).searchParams.get("id")||"",form={title:"Untitled Form",description:"",questions:[],responses:[]};function initForms(){appMain.innerHTML=`<div class="page-title"><div><h1>Emerald Forms Online</h1><p>Create forms, preview them, and collect responses.</p></div><button class="primary" onclick="saveForm()">Save to Drive</button></div><div class="grid grid-2"><section class="card card-pad"><div class="field"><label>Form title</label><input id="title"></div><div class="field"><label>Description</label><textarea id="desc"></textarea></div><div class="toolbar"><button class="secondary" onclick="addQuestion('short')">Short answer</button><button class="secondary" onclick="addQuestion('paragraph')">Paragraph</button><button class="secondary" onclick="addQuestion('choice')">Multiple choice</button></div><div id="questions"></div></section><section class="card card-pad"><h2>Preview</h2><div id="preview"></div><h2>Responses</h2><button class="secondary" onclick="exportResponses()">Export CSV</button><div id="responses" class="muted"></div></section></div>`;if(fileId)loadForm();else renderForm()}function bindMeta(){form.title=title.value;form.description=desc.value;renderPreview()}function renderForm(){title.value=form.title;desc.value=form.description;title.oninput=bindMeta;desc.oninput=bindMeta;questions.innerHTML=form.questions.map((q,i)=>`<div class="form-question"><div class="field"><label>Question</label><input value="${escapeHtml(q.label)}" oninput="form.questions[${i}].label=this.value;renderPreview()"></div><div class="toolbar"><select onchange="form.questions[${i}].type=this.value;renderForm()"><option ${q.type==="short"?"selected":""}>short</option><option ${q.type==="paragraph"?"selected":""}>paragraph</option><option ${q.type==="choice"?"selected":""}>choice</option></select>${q.type==="choice"?`<input value="${escapeHtml((q.options||[]).join(', '))}" oninput="form.questions[${i}].options=this.value.split(',').map(x=>x.trim())" placeholder="Options comma-separated">`:""}<button class="danger" onclick="form.questions.splice(${i},1);renderForm()">Remove</button></div></div>`).join("");renderPreview();responses.textContent=(form.responses||[]).length+" responses"}function addQuestion(type){form.questions.push({type,label:"Question "+(form.questions.length+1),options:type==="choice"?["Option 1","Option 2"]:[]});renderForm()}function renderPreview(){preview.innerHTML=`<h3>${escapeHtml(form.title)}</h3><p class="muted">${escapeHtml(form.description)}</p>`+form.questions.map((q,i)=>`<div class="field"><label>${escapeHtml(q.label)}</label>${q.type==="paragraph"?`<textarea data-q="${i}"></textarea>`:q.type==="choice"?`<select data-q="${i}">${(q.options||[]).map(o=>`<option>${escapeHtml(o)}</option>`).join("")}</select>`:`<input data-q="${i}">`}</div>`).join("")+`<button class="primary" onclick="submitPreview()">Submit Response</button>`}function submitPreview(){let res={created_at:new Date().toISOString(),answers:{}};document.querySelectorAll("[data-q]").forEach(el=>res.answers[form.questions[el.dataset.q].label]=el.value);form.responses.push(res);renderForm();toast("Response recorded")}async function loadForm(){const d=await(await api(`/api/drive/open?id=${fileId}&json=1`)).json();if(!d.ok){toast(d.error);return}try{form=JSON.parse(atob(d.content_base64||"{}"))}catch{}renderForm()}async function saveForm(){let content=JSON.stringify(form),name=(title.value||form.title||"Untitled Form")+".eform";if(fileId){let d=await(await api("/api/drive/update",{method:"POST",body:JSON.stringify({id:fileId,name,mime_type:"application/vnd.emerald.form",content})})).json();if(!d.ok){toast(d.error);return}}else{let d=await(await api("/api/drive/create",{method:"POST",body:JSON.stringify({name,kind:"file",mime_type:"application/vnd.emerald.form",content})})).json();if(!d.ok){toast(d.error);return}fileId=d.file.id;history.replaceState(null,"",`?id=${fileId}`)}toast("Saved")}function exportResponses(){let rows=["created_at,"+form.questions.map(q=>JSON.stringify(q.label)).join(",")];for(const r of form.responses)rows.push(JSON.stringify(r.created_at)+","+form.questions.map(q=>JSON.stringify(r.answers[q.label]||"")).join(","));let a=document.createElement("a");a.href=URL.createObjectURL(new Blob([rows.join("\n")],{type:"text/csv"}));a.download=(form.title||"responses")+".csv";a.click()}</script></body></html>
