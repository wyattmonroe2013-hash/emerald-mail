<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Emerald Admin Console</title><link rel="stylesheet" href="../../assets/emerald-suite.css"><link rel="icon" href="../../assets/emerald-mail-logo.png"></head><body><script src="../../assets/emerald-suite.js"></script><script>document.body.innerHTML=appShell("admin");if(requireLogin())initAdmin();function initAdmin(){appMain.innerHTML=`<div class="page-title"><div><h1>Emerald Admin Console</h1><p>Workspace administration for Emerald Account.</p></div></div><div class="card card-pad"><div class="field"><label>Admin Key</label><input id="adminKey" type="password" placeholder="EMERALD_MAIL_ADMIN_KEY"></div><div class="toolbar"><button class="primary" onclick="listAccounts()">List Accounts</button><button class="secondary" onclick="testSupport()">Send Support Test</button><button class="secondary" onclick="setup()">Run Setup</button></div></div><br><div class="card"><table class="table"><tbody id="adminRows"><tr><td>Enter admin key to begin.</td></tr></tbody></table></div>`}function key(){return encodeURIComponent(adminKey.value)}async function setup(){const d=await(await fetch(EMERALD_MAIL_WORKER_URL+`/api/setup?admin_key=${key()}`)).json();toast(d.message||d.error||"Done")}async function listAccounts(){const d=await(await fetch(EMERALD_MAIL_WORKER_URL+`/api/admin/accounts?admin_key=${key()}`)).json();if(!d.ok){toast(d.error);return}adminRows.innerHTML=(d.accounts||[]).map(a=>`<tr><td><b>${escapeHtml(a.address)}</b><div class="muted">${escapeHtml(a.display_name||"")} · admin:${a.is_admin} · send:${a.can_send} · receive:${a.can_receive}</div></td></tr>`).join("")}async function testSupport(){const mailbox=prompt("Mailbox:",getAccount()?.address||"");if(!mailbox)return;const d=await(await fetch(EMERALD_MAIL_WORKER_URL+`/api/admin/support/test?admin_key=${key()}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mailbox,subject:"Emerald Account Test Notice",text:"This is a test internal support notice from Emerald Account Alpha 3.0."})})).json();toast(d.ok?"Support notice created":d.error)}</script></body></html>
