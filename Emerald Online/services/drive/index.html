<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Emerald Drive</title><link rel="stylesheet" href="../../assets/emerald-suite.css"><link rel="icon" href="../../assets/emerald-mail-logo.png"></head><body><script src="../../assets/emerald-suite.js"></script><script>
document.body.innerHTML=appShell("drive");if(requireLogin())initDrive();let currentView="my-drive",currentParent="",files=[];
function initDrive(){appMain.innerHTML=`<div class="page-title"><div><h1>Emerald Drive</h1><p>Google Drive-style file storage for Emerald Account.</p></div><div class="toolbar"><button class="primary" onclick="newMenu()">New</button><button class="secondary" onclick="pickUpload()">Upload</button><input type="file" id="uploadFile" style="display:none" multiple onchange="uploadFiles(this.files)"></div></div><div class="toolbar"><button class="secondary" onclick="setView('my-drive')">My Drive</button><button class="secondary" onclick="setView('recent')">Recent</button><button class="secondary" onclick="setView('starred')">Starred</button><button class="secondary" onclick="setView('shared')">Shared</button><button class="secondary" onclick="setView('trash')">Trash</button><button class="secondary" onclick="loadActivity()">Activity</button></div><div class="card"><table class="table"><thead><tr><th>Name</th><th>Type</th><th>Size</th><th>Updated</th><th>Actions</th></tr></thead><tbody id="fileRows"></tbody></table></div><div id="previewModal" class="modal"><div class="dialog"><div class="toolbar" style="justify-content:space-between"><h2 id="previewTitle"></h2><button class="secondary" onclick="closePreview()">Close</button></div><div id="previewBody"></div></div></div>`;globalSearch.addEventListener("input",()=>loadDrive());loadDrive()}
function setView(v){currentView=v;currentParent="";loadDrive()}async function loadDrive(){const q=globalSearch.value||"";const d=await(await api(`/api/drive/list?view=${encodeURIComponent(currentView)}&parent_id=${encodeURIComponent(currentParent)}&q=${encodeURIComponent(q)}`)).json();if(!d.ok){toast(d.error||"Drive failed");return}files=d.files||[];renderFiles()}
function renderFiles(){if(!files.length){fileRows.innerHTML=`<tr><td colspan="5" class="muted">No files here. Use New or Upload.</td></tr>`;return}fileRows.innerHTML=files.map(f=>`<tr><td><div style="display:flex;align-items:center;gap:10px"><div class="file-icon">${iconFor(f)}</div><div><b>${escapeHtml(f.name)}</b><div class="muted">${f.starred?"Starred · ":""}${f.shared?"Shared · ":""}${escapeHtml(f.description||"")}</div></div></div></td><td>${escapeHtml(labelFor(f))}</td><td>${f.kind==="folder"?"—":fmtBytes(f.size)}</td><td>${fmtDate(f.updated_at)}</td><td><button class="secondary" onclick="openFile('${f.id}')">Open</button> <button class="secondary" onclick="starFile('${f.id}',${!f.starred})">${f.starred?"Unstar":"Star"}</button> <button class="secondary" onclick="shareFile('${f.id}',${!f.shared})">${f.shared?"Unshare":"Share"}</button> ${currentView==="trash"?`<button class="secondary" onclick="restoreFile('${f.id}')">Restore</button> <button class="danger" onclick="deleteForever('${f.id}')">Delete Forever</button>`:`<button class="danger" onclick="trashFile('${f.id}')">Trash</button>`}</td></tr>`).join("")}
function iconFor(f){if(f.kind==="folder")return"▰";if(f.mime_type.includes("sheet"))return"▦";if(f.mime_type.includes("form"))return"☷";if(f.mime_type.includes("image"))return"▧";if(f.mime_type.includes("video")||f.mime_type.includes("audio"))return"▶";return"▣"}function labelFor(f){if(f.kind==="folder")return"Folder";if(f.mime_type.includes("emerald.doc"))return"Emerald Doc";if(f.mime_type.includes("emerald.sheet"))return"Emerald Sheet";if(f.mime_type.includes("emerald.form"))return"Emerald Form";return f.mime_type}
function newMenu(){const type=prompt("Create: folder, doc, sheet, form, note","folder");if(!type)return;const name=prompt("Name:",type==="folder"?"New Folder":"Untitled");if(!name)return;const map={folder:["folder","application/vnd.emerald.folder",""],doc:["file","application/vnd.emerald.doc","<h1>Untitled Document</h1><p>Start writing...</p>"],sheet:["file","application/vnd.emerald.sheet",JSON.stringify({cells:{},rows:30,cols:12})],form:["file","application/vnd.emerald.form",JSON.stringify({title:name,questions:[],responses:[]})],note:["file","text/plain",""]};const m=map[type]||map.note;api("/api/drive/create",{method:"POST",body:JSON.stringify({name,kind:m[0],mime_type:m[1],content:m[2],parent_id:currentParent})}).then(r=>r.json()).then(d=>{if(!d.ok)throw new Error(d.error);toast("Created");loadDrive()}).catch(e=>toast(e.message))}
function pickUpload(){uploadFile.click()}function uploadFiles(list){[...list].forEach(file=>{const reader=new FileReader();reader.onload=()=>{api("/api/drive/upload",{method:"POST",body:JSON.stringify({name:file.name,mime_type:file.type||"application/octet-stream",content_base64:String(reader.result),parent_id:currentParent})}).then(r=>r.json()).then(d=>{if(!d.ok)throw new Error(d.error);toast("Uploaded "+file.name);loadDrive()}).catch(e=>toast(e.message))};reader.readAsDataURL(file)})}
function openFile(id){const f=files.find(x=>x.id===id);if(!f)return;if(f.kind==="folder"){currentParent=f.id;currentView="my-drive";loadDrive();return}if(f.mime_type.includes("emerald.doc"))location.href=`../docs/index.html?id=${id}`;else if(f.mime_type.includes("emerald.sheet"))location.href=`../sheets/index.html?id=${id}`;else if(f.mime_type.includes("emerald.form"))location.href=`../forms/index.html?id=${id}`;else if(f.mime_type.includes("image")||f.mime_type.includes("video")||f.mime_type.includes("audio"))location.href=`../media/index.html?id=${id}`;else previewFile(id)}
async function previewFile(id){const f=files.find(x=>x.id===id);const d=await(await api(`/api/drive/open?id=${id}&json=1`)).json();if(!d.ok){toast(d.error);return}previewTitle.textContent=f.name;let content="";try{content=atob(d.content_base64||"")}catch{}previewBody.innerHTML=`<pre style="white-space:pre-wrap;background:#f7fafc;border:1px solid var(--line);border-radius:14px;padding:14px;max-height:55vh;overflow:auto">${escapeHtml(content.slice(0,200000))}</pre>`;previewModal.classList.add("open")}function closePreview(){previewModal.classList.remove("open")}
function starFile(id,starred){api("/api/drive/star",{method:"POST",body:JSON.stringify({id,starred})}).then(()=>loadDrive())}function shareFile(id,shared){api("/api/drive/share",{method:"POST",body:JSON.stringify({id,shared})}).then(()=>{toast(shared?"Sharing enabled":"Sharing disabled");loadDrive()})}function trashFile(id){api("/api/drive/trash",{method:"POST",body:JSON.stringify({id})}).then(()=>{toast("Moved to Trash");loadDrive()})}function restoreFile(id){api("/api/drive/restore",{method:"POST",body:JSON.stringify({id})}).then(()=>{toast("Restored");loadDrive()})}function deleteForever(id){if(confirm("Permanently delete this file?"))api("/api/drive/permanent-delete",{method:"POST",body:JSON.stringify({id})}).then(()=>{toast("Deleted forever");loadDrive()})}async function loadActivity(){const d=await(await api("/api/drive/activity")).json();fileRows.innerHTML=(d.activity||[]).map(a=>`<tr><td colspan="5"><b>${escapeHtml(a.action)}</b> ${escapeHtml(a.details||"")} <span class="muted">${fmtDate(a.created_at)}</span></td></tr>`).join("")||`<tr><td colspan="5">No activity.</td></tr>`}
</script></body></html>
